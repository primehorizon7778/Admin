<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پروجیکٹ اپڈیٹ</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 85%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        #clock {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #ffd700;
        }

        h1 { font-size: 1.8rem; margin: 10px 0; }
        
        .msg { font-size: 1.1rem; line-height: 1.6; margin: 20px 0; }

        .date-box {
            background: #fff;
            color: #1e3c72;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            display: inline-block;
        }

        /* Icons Animation */
        .icons {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .icon {
            font-size: 2rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

<div class="container">
    <div id="clock"></div>
    <h1>Hello NAZIM HUSSAIN</h1>
    <p class="msg">ہم معذرت خواہ ہیں آپ کا پروجیکٹ مکمل ہو چکا ہے لیکن ہم آئی ڈیز پر کام کر رہے ہیں۔ <br> انتظار کریں۔ شکریہ۔</p>
    <div class="date-box">اختتامی تاریخ: 08-07-2026</div>
    
    <div class="icons">
        <div class="icon">🚀</div>
        <div class="icon">💻</div>
        <div class="icon">⏳</div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('clock').innerText = now.toLocaleDateString('ur-PK', options);
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
