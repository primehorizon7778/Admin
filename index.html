<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Prime Horizon • Admin Panel</title>
  <!-- Font Awesome 6 for crisp icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 30% 10%, #0b0f1c, #03050a);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Deep tech background with subtle animated grid & glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(0, 180, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 255, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
      animation: subtleGrid 20s infinite linear;
    }

    @keyframes subtleGrid {
      0% { opacity: 0.4; }
      50% { opacity: 0.8; }
      100% { opacity: 0.4; }
    }

    /* floating orbs for atmosphere */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.2;
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 70vmax;
      height: 70vmax;
      background: radial-gradient(circle, #00a6ff, #001f3f);
      top: -20%;
      left: -15%;
      animation: floatOrb 18s infinite alternate ease-in-out;
    }

    .orb-2 {
      width: 60vmax;
      height: 60vmax;
      background: radial-gradient(circle, #4f46e5, #0f0c29);
      bottom: -20%;
      right: -10%;
      animation: floatOrb 22s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(5%, -8%) scale(1.15); }
    }

    /* main card – glass morphic, clean 3D feel */
    .glass-panel {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 580px;
      background: rgba(18, 22, 35, 0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 3.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 30px 55px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(74, 144, 226, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      padding: 2.8rem 2.2rem 2.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.4s;
    }

    .glass-panel:hover {
      box-shadow: 0 40px 70px rgba(0, 160, 255, 0.25), 0 0 0 1px rgba(0, 180, 255, 0.5);
      transform: translateY(-5px);
    }

    /* 3D animated name "Prime Horizon" */
    .title-3d {
      font-size: clamp(2.8rem, 10vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffffff 0%, #b8e2ff 70%, #6bb5ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 10px 18px rgba(0, 160, 255, 0.5));
      transform-style: preserve-3d;
      animation: float3D 5s infinite ease-in-out;
      text-shadow: 0 5px 15px rgba(0,180,255,0.7);
      line-height: 1.2;
    }

    @keyframes float3D {
      0% { transform: translateZ(0px) rotateX(0deg) rotateY(0deg); }
      25% { transform: translateZ(18px) rotateX(2deg) rotateY(2deg); }
      75% { transform: translateZ(12px) rotateX(-1deg) rotateY(-1deg); }
      100% { transform: translateZ(0px) rotateX(0deg) rotateY(0deg); }
    }

    .sub-brand {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 4px;
      color: rgba(220, 235, 255, 0.9);
      margin-bottom: 2.2rem;
      text-transform: uppercase;
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 1.8rem;
      border-radius: 30px;
      backdrop-filter: blur(5px);
    }

    /* Logo container with animation */
    .logo-wrapper {
      margin: 0.8rem 0 1.8rem;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-ring {
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #00c2ff, #3b82f6, #8b5cf6, #00c2ff);
      opacity: 0.5;
      filter: blur(12px);
      animation: rotateGlow 8s infinite linear;
    }

    @keyframes rotateGlow {
      0% { transform: rotate(0deg); opacity: 0.4; }
      50% { opacity: 0.7; }
      100% { transform: rotate(360deg); opacity: 0.4; }
    }

    .logo-img {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      object-fit: contain;
      z-index: 5;
      background: rgba(10, 15, 28, 0.8);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 180, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.35);
      transition: all 0.3s ease;
      animation: logoFloat 4s ease-in-out infinite;
      display: block;
    }

    @keyframes logoFloat {
      0% { transform: translateY(0px) rotate(0deg); }
      25% { transform: translateY(-7px) rotate(1deg); }
      75% { transform: translateY(5px) rotate(-1deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .logo-img:hover {
      transform: scale(1.05);
      box-shadow: 0 25px 45px #0066ffaa;
    }

    /* Professional system display */
    .system-info {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 2.5rem;
      padding: 1.4rem 2rem;
      margin: 1.8rem 0 1.8rem;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .owner-line {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #f0f9ff;
      letter-spacing: 0.5px;
    }

    .owner-line i {
      color: #3b82f6;
      font-size: 1.5rem;
      filter: drop-shadow(0 0 6px #3b82f6);
    }

    .owner-name {
      background: linear-gradient(to right, #ffffff, #b3d9ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .badge {
      background: rgba(59, 130, 246, 0.15);
      border: 1px solid rgba(59,130,246,0.5);
      border-radius: 40px;
      padding: 0.3rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #a5d8ff;
      margin-top: 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(5px);
    }

    /* Server login button */
    .server-login-btn {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      border: 1.5px solid rgba(0, 180, 255, 0.7);
      color: white;
      font-weight: 700;
      font-size: 1.35rem;
      padding: 1rem 2.8rem;
      border-radius: 3rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      background: linear-gradient(120deg, rgba(0,100,200,0.2), rgba(0,180,255,0.1));
      box-shadow: 0 10px 25px rgba(0,140,255,0.3);
      margin-top: 0.5rem;
      width: fit-content;
      text-decoration: none;
      backdrop-filter: blur(12px);
    }

    .server-login-btn i {
      font-size: 1.4rem;
      color: #7bc8ff;
      transition: transform 0.2s;
    }

    .server-login-btn:hover {
      background: rgba(0, 140, 255, 0.25);
      border-color: #ffffff;
      box-shadow: 0 0 35px #006eff;
      transform: scale(1.03);
      color: #ffffff;
    }

    .server-login-btn:hover i {
      transform: translateX(4px);
      color: white;
    }

    .footer-note {
      margin-top: 1.6rem;
      font-size: 0.8rem;
      color: rgba(200, 215, 240, 0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* responsive touches */
    @media (max-width: 480px) {
      .glass-panel {
        padding: 2rem 1.4rem;
      }
      .server-login-btn {
        padding: 0.9rem 2rem;
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- atmospheric elements -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Main 3D Neat Card -->
  <div class="glass-panel">
    
    <!-- 3D Name -->
    <h1 class="title-3d">Prime Horizon</h1>
    <div class="sub-brand">
      <i class="fas fa-crown" style="margin-right: 6px;"></i> ADMIN PANEL
    </div>

    <!-- Logo with animation - fixed image display -->
    <div class="logo-wrapper">
      <div class="logo-ring"></div>
      <img 
        src="https://i.ibb.co/p6KZbMYX/ic-launcher-round.png" 
        alt="Prime Horizon Logo" 
        class="logo-img"
        loading="eager"
        onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22110%22 height=%22110%22 viewBox=%220 0 110 110%22%3E%3Crect width=%22110%22 height=%22110%22 rx=%2228%22 fill=%22%230b1225%22/%3E%3Ctext x=%2255%22 y=%2265%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22%2300b4ff%22%3E🔷%3C/text%3E%3C/svg%3E';"
      >
    </div>

    <!-- Professional System / Owner info -->
    <div class="system-info">
      <div class="owner-line">
        <i class="fas fa-shield-haltered"></i> 
        <span>System Operator</span>
      </div>
      <div style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <span class="owner-name" style="font-size: 1.8rem; font-weight: 700;">Nazim Khichi</span>
        <span class="badge"><i class="fas fa-check-circle"></i> verified</span>
      </div>
      <div style="margin-top: 0.3rem; color: #b0d4f0; font-size: 0.9rem; letter-spacing: 1px;">
        <i class="fas fa-microchip"></i> Secure Horizon Core v2.4
      </div>
    </div>

    <!-- Server Login Button (click opens external admin panel) -->
    <a 
      href="https://primehorizon7778.github.io/Admin-panel/" 
      target="_blank" 
      rel="noopener noreferrer" 
      class="server-login-btn"
    >
      <i class="fas fa-server"></i> SERVER LOGIN <i class="fas fa-arrow-right"></i>
    </a>

    <!-- subtle footer -->
    <div class="footer-note">
      <i class="fas fa-lock" style="font-size: 0.7rem;"></i> 
      End-to-end encrypted session • Prime Horizon
    </div>
  </div>
</body>
</html>
